<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — NestFinder</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body data-page="reset">

    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">🏠</div>
                NestFinder
            </a>
        </div>
    </nav>

    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
        <div
            style="background:white;border:1px solid var(--border);border-radius:20px;padding:40px;max-width:400px;width:100%;box-shadow:var(--shadow-md)">
            <div style="text-align:center;margin-bottom:28px">
                <div style="font-size:40px;margin-bottom:12px">🔑</div>
                <h2 style="font-family:var(--font-head);font-size:24px;margin-bottom:6px">Set New Password</h2>
                <p style="color:var(--ink-3);font-size:14px">Choose a strong password for your account</p>
            </div>

            <div id="resetForm">
                <div style="margin-bottom:16px">
                    <label
                        style="font-size:12px;font-weight:600;color:var(--ink-2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em">New
                        Password</label>
                    <input type="password" id="newPassword" placeholder="Min. 8 characters"
                        style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none" />
                </div>
                <div style="margin-bottom:24px">
                    <label
                        style="font-size:12px;font-weight:600;color:var(--ink-2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em">Confirm
                        Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat password"
                        style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none" />
                </div>
                <button onclick="submitReset()"
                    style="width:100%;padding:13px;background:var(--ink);color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer">
                    🔒 Reset Password
                </button>
            </div>

            <div id="resetResult" style="display:none;text-align:center">
                <div style="font-size:44px;margin-bottom:12px">✅</div>
                <h3 style="margin-bottom:8px">Password Reset!</h3>
                <p style="color:var(--ink-3);font-size:14px;margin-bottom:20px">You can now sign in with your new
                    password.</p>
                <a href="index.html"
                    style="display:inline-block;background:var(--ink);color:white;padding:11px 28px;border-radius:8px;font-weight:600;text-decoration:none">Go
                    to Home</a>
            </div>
        </div>
    </div>

    <script>
        async function submitReset() {
            const token = new URLSearchParams(window.location.search).get('token');
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!password || password.length < 8) {
                alert('Password must be at least 8 characters'); return;
            }
            if (password !== confirm) {
                alert('Passwords do not match!'); return;
            }

            const res = await fetch('http://localhost:5000/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password })
            });

            const data = await res.json();
            if (data.error) {
                alert(data.error); return;
            }

            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('resetResult').style.display = 'block';
        }
    </script>
</body>

</html>
